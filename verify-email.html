<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a12">
    <meta name="description" content="Verify your email - CephasGM GameZone">
    <title>Verify Email | CephasGM GameZone</title>
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a12;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('https://images.unsplash.com/photo-1508098682722-e99c643edc58?w=1920&q=80');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(10,10,18,0.92) 0%, rgba(10,10,18,0.7) 50%, rgba(10,10,18,0.92) 100%);
            z-index: 0;
        }
        
        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }
        
        .auth-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            text-align: center;
        }
        
        .auth-card .icon {
            font-size: 72px;
            margin-bottom: 12px;
        }
        .auth-card .title {
            font-size: 24px;
            font-weight: 700;
        }
        .auth-card .sub {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
            line-height: 1.6;
        }
        .auth-card .email-display {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 12px 16px;
            margin: 16px 0;
            font-weight: 600;
            font-size: 15px;
            color: #0055ff;
            word-break: break-all;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #0055ff, #542bff);
            color: white;
            padding: 14px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 85, 255, 0.25);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 85, 255, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            padding: 12px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .auth-link {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        .auth-link:hover {
            color: #ffffff;
        }
        .auth-link-primary {
            color: #0055ff;
        }
        .auth-link-primary:hover {
            color: #4d8aff;
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px 24px;
            min-width: 280px;
            animation: slideUp 0.4s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .toast-success { border-left: 4px solid #00ff64; }
        .toast-error { border-left: 4px solid #ff0044; }
        .toast-warning { border-left: 4px solid #ffd700; }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .auth-card {
                padding: 28px 20px;
                border-radius: 24px;
            }
            .auth-container {
                padding: 12px;
            }
            .auth-card .icon {
                font-size: 56px;
            }
            .auth-card .title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        
        <!-- Logo -->
        <a href="/" class="inline-block mb-6">
            <span class="text-2xl font-bold">
                <span class="text-gradient">CephasGM</span>
                <span class="text-white font-light">|</span>
                <span class="text-white font-semibold">GameZone</span>
            </span>
        </a>
        
        <!-- Icon -->
        <div class="icon">📧</div>
        
        <!-- Title -->
        <div class="title">Verify Your Email</div>
        <div class="sub">
            We've sent a verification link to your email address. Please check your inbox and click the link to verify your account.
        </div>
        
        <!-- Email Display -->
        <div class="email-display" id="emailDisplay">
            j***@example.com
        </div>
        
        <!-- Resend Button -->
        <button class="btn-primary" id="resendBtn">Resend Verification Email</button>
        
        <!-- Or -->
        <div class="divider my-6" style="display: flex; align-items: center; gap: 16px; color: rgba(255,255,255,0.2); font-size: 13px;">
            <span style="flex: 1; height: 1px; background: rgba(255,255,255,0.06);"></span>
            <span>or</span>
            <span style="flex: 1; height: 1px; background: rgba(255,255,255,0.06);"></span>
        </div>
        
        <!-- Already verified? -->
        <button class="btn-secondary" id="alreadyVerifiedBtn">I've Already Verified</button>
        
        <!-- Back to Sign In -->
        <div class="text-center mt-4">
            <a href="/signin.html" class="auth-link flex items-center justify-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Back to Sign In
            </a>
        </div>
        
        <!-- Need help? -->
        <div class="text-center mt-3">
            <a href="/support.html" class="text-xs text-white/20 hover:text-white/50 transition-colors">Need help? Contact Support</a>
        </div>
        
    </div>
</div>

<!-- ==========================================
     JAVASCRIPT
     ========================================== -->
<script>
(function() {
    'use strict';
    
    // ============================================
    // DOM REFS
    // ============================================
    const resendBtn = document.getElementById('resendBtn');
    const alreadyVerifiedBtn = document.getElementById('alreadyVerifiedBtn');
    const emailDisplay = document.getElementById('emailDisplay');
    
    // ============================================
    // TOAST
    // ============================================
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerHTML = `
            <div class="flex items-center space-x-3">
                <span>${type === 'success' ? '✅' : type === 'error' ? '❌' : '⚠️'}</span>
                <span class="text-sm">${message}</span>
                <button onclick="this.parentElement.parentElement.remove()" class="text-white/30 hover:text-white/70 transition-colors ml-2">
                    ✕
                </button>
            </div>
        `;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(20px)';
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }
    
    // ============================================
    // SIMULATE EMAIL FROM URL PARAM
    // ============================================
    function getEmailFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('email') || 'j***@example.com';
    }
    emailDisplay.textContent = getEmailFromURL();
    
    // ============================================
    // RESEND VERIFICATION
    // ============================================
    resendBtn.addEventListener('click', function() {
        this.textContent = 'Sending...';
        this.disabled = true;
        
        setTimeout(() => {
            showToast('📧 Verification email sent successfully! Please check your inbox.', 'success');
            this.textContent = 'Resend Verification Email';
            this.disabled = false;
        }, 1500);
    });
    
    // ============================================
    // ALREADY VERIFIED
    // ============================================
    alreadyVerifiedBtn.addEventListener('click', function() {
        showToast('✅ Redirecting to your dashboard...', 'success');
        setTimeout(() => {
            window.location.href = '/dashboard.html';
        }, 1500);
    });
    
    // ============================================
    // PWA SERVICE WORKER
    // ============================================
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW registered'))
                .catch(err => console.log('SW registration failed'));
        });
    }
    
    console.log('📧 Verify Email page loaded');
    
})();
</script>

</body>
</html>
